name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true
workers_dev = false

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "cloud-mail-db"
database_id = "f00b6473-25b1-47c2-95ed-139d2bf41bc6"

[[kv_namespaces]]
binding = "kv"
id = "9357cf6d34ef48ef9bb5fe31162f634f"

[[r2_buckets]]
binding = "r2"
bucket_name = "cloud-mail-r2"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#定时任务每天晚上12点执行


#[vars]
# 變數在 Cloudflare Dashboard 設定，不寫進 repo（含敏感資訊）
# domain, admin, jwt_secret

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
